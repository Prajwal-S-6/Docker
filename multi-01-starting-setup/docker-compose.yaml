version: "3.8"

services:
  mongodb:
    image: mongo
    container_name: mongo-db
    env_file:
      - .env
    volumes:
      - mongo-data:/data/db
    networks:
      - multi-app

  backend:
#    build: ./backend
     build:
       context: ./backend
       dockerfile: Dockerfile
     image: backend:v1
     container_name: backend
     ports:
       - "8080:80"
     environment:
       - MONGODB_USERNAME=praj
     volumes:
       - logs:/backendApp/logs
       - ./backend:/backendApp
       - /backendApp/node_modules
     networks:
       - multi-app
     depends_on:
       - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: frontend:v1
    container_name: frontendApp
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/frontendApp/src
    stdin_open: true
    tty: true
    depends_on:
      - backend
volumes:
  mongo-data:
  logs:

networks:
  multi-app:

---

version: "3.8"
services:
  redis:
    container_name: redisdb
    image: redis
    volumes:
      - redisData:/redis/data
    networks:
      - my-network
  postgres:
    container_name: postgresdb
    image: postgres
    environment:
      - POSTGRES_PASSWORD=password
    volumes:
      - postgresData:/postgres/data
    networks:
      - my-network
  worker:
    container_name: worker
    image: kodekloud/examplevotingapp_worker:v1
    networks:
      - my-network
    depends_on:
      - redis
      - postgres
  voting-app:
    container_name: votingApp
    image: kodekloud/examplevotingapp_vote:v1
    ports:
      - "8080:80"
    networks:
      - my-network
    depends_on:
      - redis
  result-app:
    container_name: resultApp
    image: kodekloud/examplevotingapp_result:v1
    ports:
      - "8090:80"
    networks:
      - my-network
    depends_on:
      - postgres

volumes:
  redisData:
networks:
  my-network: